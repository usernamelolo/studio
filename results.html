<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мои результаты</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .result-card { transition: all 0.3s; }
    .result-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
  <div class="max-w-6xl mx-auto p-6">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold bg-gradient-to-r from-violet-400 to-fuchsia-400 bg-clip-text text-transparent">Мои результаты</h1>
      <a href="generation.html" class="bg-zinc-800 hover:bg-zinc-700 px-6 py-3 rounded-2xl flex items-center gap-3 text-lg">
        ← Назад к генерации
      </a>
    </div>

    <div id="results-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <!-- карточки сюда -->
    </div>

    <div id="empty-message" class="hidden mt-8 p-6 bg-zinc-900 border border-zinc-700 rounded-3xl text-center text-xl">Пока нет результатов</div>
  </div>

  <script>
    const currentUser = localStorage.getItem('currentUser');
    if (!currentUser) window.location.href = 'index.html';

    async function loadResults() {
      const grid = document.getElementById('results-grid');
      grid.innerHTML = '';

      try {
        const res = await fetch(`/api/generations?action=get&user=${encodeURIComponent(currentUser)}`);
        const list = await res.json();

        if (!Array.isArray(list) || list.length === 0) {
          document.getElementById('empty-message').classList.remove('hidden');
          return;
        }

        list.forEach(item => {
          const card = document.createElement('div');
          card.className = 'result-card bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden';

          let content = '';
          if (item.type === 'video') {
            content = `
              <video src="${item.url}" controls class="w-full aspect-video bg-black"></video>
              <div class="p-5">
                <p class="text-sm text-zinc-400 mb-3">Видео • ${new Date(item.date).toLocaleString('ru-RU')}</p>
                <p class="line-clamp-2 text-zinc-300">${item.prompt}</p>
                <div class="flex gap-3 mt-4">
                  <a href="${item.url}" download class="flex-1 bg-green-600 hover:bg-green-500 py-3 rounded-2xl text-center font-medium">Скачать</a>
                  <button onclick="deleteResult(${item.id})" class="flex-1 bg-red-600 hover:bg-red-500 py-3 rounded-2xl text-center font-medium">Удалить</button>
                </div>
              </div>
            `;
          } else {
            content = `
              <img src="${item.url}" class="w-full h-64 object-cover">
              <div class="p-5">
                <p class="text-sm text-zinc-400 mb-3">Изображение • ${new Date(item.date).toLocaleString('ru-RU')}</p>
                <p class="line-clamp-2 text-zinc-300">${item.prompt}</p>
                <div class="flex gap-3 mt-4">
                  <a href="${item.url}" download class="flex-1 bg-green-600 hover:bg-green-500 py-3 rounded-2xl text-center font-medium">Скачать</a>
                  <button onclick="deleteResult(${item.id})" class="flex-1 bg-red-600 hover:bg-red-500 py-3 rounded-2xl text-center font-medium">Удалить</button>
                </div>
              </div>
            `;
          }

          card.innerHTML = content;
          grid.appendChild(card);
        });
      } catch (err) {
        console.error(err);
      }
    }

    async function deleteResult(id) {
      if (!confirm('Удалить этот результат?')) return;
      await fetch('/api/generations', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user: currentUser, action: 'delete', data: { id } })
      });
      loadResults();
    }

    loadResults();
  </script>
</body>
</html>
