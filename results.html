<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мои результаты</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-6 bg-gray-50">
  <h1 class="text-4xl font-bold mb-8">Мои результаты</h1>
  <div id="results-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

  <script>
    const user = localStorage.getItem('currentUser');
    const isAdmin = user === 'admin' || user === 'твой_логин';

    fetch('/api/generations?action=get&user=' + user)
      .then(r => r.json())
      .then(data => {
        const grid = document.getElementById('results-grid');
        grid.innerHTML = '';
        data.forEach(item => {
          const div = document.createElement('div');
          div.className = 'bg-white border border-indigo-100 rounded-3xl p-4';
          let html = '';
          if (item.type === 'image') {
            html = `<img src="${item.url}" class="w-full rounded-2xl">`;
          } else {
            html = `<video src="${item.url}" controls class="w-full rounded-2xl"></video>`;
          }
          html += `
            <div class="flex gap-4 mt-4">
              <a href="${item.url}" download class="flex-1 text-center bg-indigo-600 text-white py-3 rounded-2xl">Скачать</a>
              <button onclick="deleteResult(${item.id}, this)" class="flex-1 bg-red-600 text-white py-3 rounded-2xl">Удалить</button>
            </div>`;
          div.innerHTML = html;
          grid.appendChild(div);
        });
      });

    window.deleteResult = function(id, btn) {
      if (isAdmin) {
        if (confirm('Полностью удалить генерацию из хранилища?')) {
          // Здесь можно добавить API-вызов для полного удаления из Redis
          btn.parentElement.parentElement.remove();
          alert('Генерация удалена полностью');
        }
      } else {
        if (confirm('удалить')) {
          btn.parentElement.parentElement.style.opacity = '0.3';
          btn.parentElement.parentElement.style.pointerEvents = 'none';
          alert('Генерация удалена');
        }
      }
    };
  </script>
</body>
</html>
