<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мои результаты</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .result-card { transition: all 0.3s; }
    .result-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
  <div class="max-w-6xl mx-auto p-6">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold bg-gradient-to-r from-violet-400 to-fuchsia-400 bg-clip-text text-transparent">Мои результаты</h1>
      <a href="generation.html" class="bg-zinc-800 hover:bg-zinc-700 px-6 py-3 rounded-2xl flex items-center gap-3 text-lg">
        ← Назад к генерации
      </a>
    </div>

    <div id="results-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <!-- сюда будут вставляться карточки -->
    </div>

    <div id="error-message" class="hidden mt-8 p-6 bg-red-950 border border-red-500 rounded-3xl text-center text-red-300 text-xl"></div>
    <div id="empty-message" class="hidden mt-8 p-6 bg-zinc-900 border border-zinc-700 rounded-3xl text-center text-zinc-400 text-xl">Пока нет сгенерированных результатов</div>
  </div>

  <script>
    const currentUser = localStorage.getItem('currentUser');
    if (!currentUser) {
      window.location.href = 'index.html';
    }

    async function loadResults() {
      const grid = document.getElementById('results-grid');
      const errorDiv = document.getElementById('error-message');
      const emptyDiv = document.getElementById('empty-message');
      
      grid.innerHTML = '';
      errorDiv.classList.add('hidden');
      emptyDiv.classList.add('hidden');

      try {
        const res = await fetch(`/api/generations?action=get&user=${encodeURIComponent(currentUser)}`);
        const data = await res.json();

        console.log('Полученные данные из API:', data); // ← для отладки

        if (!res.ok || data.error) {
          errorDiv.textContent = data.error ? `Ошибка: ${data.error}` : 'Ошибка сервера при загрузке результатов';
          errorDiv.classList.remove('hidden');
          return;
        }

        if (!Array.isArray(data) || data.length === 0) {
          emptyDiv.classList.remove('hidden');
          return;
        }

        // Нормальное отображение результатов
        data.forEach(item => {
          const card = document.createElement('div');
          card.className = 'result-card bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden';
          
          let content = '';
          if (item.type === 'video') {
            content = `
              <video src="${item.url}" controls class="w-full aspect-video bg-black"></video>
              <div class="p-5">
                <p class="text-sm text-zinc-400 mb-2">Видео • ${new Date(item.date).toLocaleString('ru-RU')}</p>
                <p class="line-clamp-2 text-zinc-300">${item.prompt}</p>
              </div>
            `;
          } else {
            content = `
              <img src="${item.url}" class="w-full h-64 object-cover">
              <div class="p-5">
                <p class="text-sm text-zinc-400 mb-2">Изображение • ${new Date(item.date).toLocaleString('ru-RU')}</p>
                <p class="line-clamp-2 text-zinc-300">${item.prompt}</p>
              </div>
            `;
          }

          card.innerHTML = content;
          grid.appendChild(card);
        });

      } catch (err) {
        console.error(err);
        errorDiv.textContent = 'Не удалось загрузить результаты. Проверьте подключение.';
        errorDiv.classList.remove('hidden');
      }
    }

    loadResults();
  </script>
</body>
</html>
