<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Генератор Контента</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .tab { transition: all 0.3s; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
  <div class="max-w-5xl mx-auto p-4">
    <!-- ШАПКА С КНОПКОЙ "МОИ РЕЗУЛЬТАТЫ" -->
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold bg-gradient-to-r from-violet-400 to-fuchsia-400 bg-clip-text text-transparent">AI Генератор</h1>
      <div class="flex items-center gap-4">
        <span id="username-display" class="text-lg font-medium"></span>
        <a href="results.html" class="bg-zinc-800 hover:bg-zinc-700 px-6 py-3 rounded-2xl flex items-center gap-2 text-lg">
          📊 Мои результаты
        </a>
        <button onclick="logout()" class="bg-red-600 hover:bg-red-500 px-5 py-3 rounded-2xl">Выйти</button>
      </div>
    </div>

    <!-- ТАБЫ -->
    <div class="flex flex-col gap-2 mb-8">
      <button onclick="switchTab(0)" class="tab px-6 py-4 rounded-3xl text-left text-xl font-medium bg-zinc-900 hover:bg-zinc-800 flex items-center gap-4">🎥 Видео из фото</button>
      <button onclick="switchTab(1)" class="tab px-6 py-4 rounded-3xl text-left text-xl font-medium bg-zinc-900 hover:bg-zinc-800 flex items-center gap-4">🖼️ Картинки из фото</button>
      <button onclick="switchTab(2)" class="tab px-6 py-4 rounded-3xl text-left text-xl font-medium bg-zinc-900 hover:bg-zinc-800 flex items-center gap-4">📝 Картинки из текста</button>
    </div>

    <!-- ТАБ 0: ВИДЕО -->
    <div id="tab-0" class="tab-content">
      <div class="bg-zinc-900 rounded-3xl p-8">
        <input type="file" id="video-file" accept="image/*" class="block w-full text-lg mb-6">
        <textarea id="video-prompt" rows="3" class="w-full bg-zinc-800 rounded-2xl p-6 text-lg" placeholder="Опиши видео..."></textarea>
        <div id="video-options" class="mt-6 hidden">
          <label class="block text-sm mb-2">Длительность (сек)</label>
          <select id="duration" class="bg-zinc-800 rounded-2xl p-4 w-full text-lg">
            <option value="8">8 секунд</option>
            <option value="10">10 секунд</option>
            <option value="15">15 секунд</option>
          </select>
        </div>
        <button onclick="generateVideo()" class="mt-8 w-full bg-violet-600 hover:bg-violet-500 py-6 rounded-3xl text-2xl font-medium">Сгенерировать видео</button>
        <div id="video-result" class="mt-12 hidden">
          <div id="video-status" class="text-center text-xl mb-6">Генерация...</div>
          <video id="video-player" controls class="w-full rounded-3xl"></video>
          <div class="flex gap-4 mt-6">
            <a id="video-download" download class="flex-1 bg-green-600 py-5 rounded-3xl text-center">Скачать</a>
            <button onclick="stopVideoGeneration()" class="flex-1 bg-red-600 py-5 rounded-3xl">Отмена</button>
          </div>
        </div>
        <pre id="video-debug" class="mt-8 text-xs bg-black p-4 rounded-2xl overflow-auto max-h-48"></pre>
      </div>
    </div>

    <!-- ТАБ 1: КАРТИНКИ ИЗ ФОТО -->
    <div id="tab-1" class="tab-content hidden">
      <div class="bg-zinc-900 rounded-3xl p-8">
        <input type="file" id="edit-file" accept="image/*" class="block w-full text-lg mb-6">
        <textarea id="edit-prompt" rows="3" class="w-full bg-zinc-800 rounded-2xl p-6 text-lg" placeholder="Что изменить..."></textarea>
        <button onclick="editImage()" class="mt-8 w-full bg-violet-600 hover:bg-violet-500 py-6 rounded-3xl text-2xl font-medium">Сгенерировать 1 картинку</button>
        <div id="edit-result" class="mt-12 hidden">
          <img id="edit-image" class="w-full rounded-3xl">
          <a id="edit-download" download class="block mt-6 text-center bg-green-600 py-5 rounded-3xl">Скачать</a>
        </div>
        <pre id="edit-debug" class="mt-8 text-xs bg-black p-4 rounded-2xl overflow-auto max-h-48"></pre>
      </div>
    </div>

    <!-- ТАБ 2: КАРТИНКИ ИЗ ТЕКСТА -->
    <div id="tab-2" class="tab-content hidden">
      <div class="bg-zinc-900 rounded-3xl p-8">
        <textarea id="text-prompt" rows="4" class="w-full bg-zinc-800 rounded-2xl p-6 text-lg" placeholder="Опиши картинку..."></textarea>
        <button onclick="generateTextImages()" class="mt-8 w-full bg-violet-600 hover:bg-violet-500 py-6 rounded-3xl text-2xl font-medium">Сгенерировать 1 картинку</button>
        <pre id="text-debug" class="mt-8 text-xs bg-black p-4 rounded-2xl overflow-auto max-h-48"></pre>
      </div>
    </div>
  </div>

  <script>
    const currentUser = localStorage.getItem('currentUser');
    if (!currentUser) window.location.href = 'index.html';
    document.getElementById('username-display').textContent = currentUser;

    function logout() { localStorage.removeItem('currentUser'); window.location.href = 'index.html'; }
    function switchTab(n) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById('tab-' + n).classList.remove('hidden');
    }

    async function apiFetch(path, options = {}) {
      const res = await fetch('/api/proxy' + path, {
        ...options,
        headers: { 'Content-Type': 'application/json', ...options.headers }
      });
      return res;
    }

    async function saveGeneration(type, url, prompt) {
      await fetch('/api/generations', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user: currentUser, action: 'save', data: { type, url, prompt } })
      });
    }

    function fileToBase64(file) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.readAsDataURL(file);
      });
    }

    // ====================== КАРТИНКИ ИЗ ФОТО ======================
    async function editImage() {
      const file = document.getElementById('edit-file').files[0];
      const prompt = document.getElementById('edit-prompt').value.trim();
      if (!file || !prompt) return alert('Загрузи фото и напиши промпт');

      const debug = document.getElementById('edit-debug');
      const resultDiv = document.getElementById('edit-result');
      debug.textContent = 'Отправка...';

      const base64 = await fileToBase64(file);

      try {
        const res = await apiFetch('/v1/images/edits', {
          method: 'POST',
          body: JSON.stringify({ model: "grok-imagine-image", prompt, image: base64, n: 1, response_format: "b64_json" })
        });

        const raw = await res.text();
        let data;
        try { data = JSON.parse(raw); } catch { data = { raw }; }

        debug.innerHTML = '<strong>RAW ответ API:</strong><br>' + JSON.stringify(data, null, 2);

        let b64 = null;
        if (data.data && data.data[0] && data.data[0].b64_json) b64 = data.data[0].b64_json;
        else if (data.data && data.data[0] && data.data[0].url) b64 = data.data[0].url.split(',')[1];
        else if (data.b64_json) b64 = data.b64_json;

        if (b64) {
          const url = b64.startsWith('data:') ? b64 : `data:image/jpeg;base64,${b64}`;
          document.getElementById('edit-image').src = url;
          document.getElementById('edit-download').href = url;
          resultDiv.classList.remove('hidden');
          await saveGeneration('image', url, prompt);
          debug.innerHTML += '<br><span class="text-green-400">✅ Картинка получена и сохранена!</span>';
        }
      } catch (e) {
        debug.innerHTML = `<span class="text-red-400">Ошибка: ${e.message}</span>`;
      }
    }

    // ====================== КАРТИНКИ ИЗ ТЕКСТА ======================
    async function generateTextImages() {
      const prompt = document.getElementById('text-prompt').value.trim();
      if (!prompt) return alert('Напиши промпт');

      const debug = document.getElementById('text-debug');
      debug.innerHTML = '<span class="text-green-400">Генерация...</span>';

      try {
        const res = await apiFetch('/v1/images/generations', {
          method: 'POST',
          body: JSON.stringify({ model: "grok-imagine-image", prompt, n: 1, response_format: "b64_json", seed: Math.floor(Math.random() * 2147483647) })
        });
        const data = await res.json();
        const url = `data:image/jpeg;base64,${data.data[0].b64_json}`;
        await saveGeneration('image', url, prompt);
        debug.innerHTML = '<span class="text-green-400">Готово! Сохранено в результаты</span>';
      } catch (e) {
        debug.innerHTML = `<span class="text-red-400">Ошибка: ${e.message}</span>`;
      }
    }

    // ====================== ВИДЕО (без изменений) ======================
    let videoInterval = null;
    async function generateVideo() { /* код видео остался прежним */ }
    function stopVideoGeneration() { /* код остановки остался прежним */ }

    switchTab(0);
  </script>
</body>
</html>
