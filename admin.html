<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ панель</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f8fafc; font-family: system-ui; }
    .card { background: white; border: 2px solid #e0e7ff; }
  </style>
</head>
<body class="min-h-screen p-6">
  <div class="max-w-5xl mx-auto">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold text-indigo-700">Админ панель</h1>
      <a href="index.html" class="bg-indigo-600 text-white px-8 py-4 rounded-3xl text-lg">Вернуться на главную</a>
    </div>

    <!-- Добавление нового пользователя -->
    <div class="card p-8 rounded-3xl mb-10">
      <h2 class="text-2xl font-semibold mb-6">Добавить нового пользователя</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <input id="new-username" placeholder="Логин" class="border-2 border-indigo-200 rounded-2xl px-6 py-5 text-lg">
        <input id="new-password" type="password" placeholder="Пароль" class="border-2 border-indigo-200 rounded-2xl px-6 py-5 text-lg">
        <button onclick="addUser()" class="bg-green-600 hover:bg-green-700 text-white text-xl font-semibold py-5 rounded-3xl">Создать пользователя</button>
      </div>
    </div>

    <!-- Список всех пользователей -->
    <div id="users-list" class="space-y-6"></div>
  </div>

  <script>
    const currentUser = localStorage.getItem('currentUser');
    if (currentUser !== 'nysp') {
      alert('Доступ запрещён. Только администратор (nysp).');
      window.location.href = 'index.html';
      throw new Error('Access denied');
    }

    async function apiUsers(action, body = {}) {
      const res = await fetch('/api/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, ...body })
      });
      return res.json();
    }

    async function loadUsers() {
      const data = await apiUsers('get');
      const container = document.getElementById('users-list');
      container.innerHTML = '';
      Object.keys(data).forEach(username => {
        const div = document.createElement('div');
        div.className = 'card p-6 rounded-3xl';
        div.innerHTML = `
          <div class="flex justify-between items-center">
            <h3 class="text-2xl font-bold">Пользователь: ${username}</h3>
            <span class="text-sm bg-indigo-100 text-indigo-700 px-4 py-2 rounded-2xl">${data[username].role === 'admin' ? 'Администратор' : 'Пользователь'}</span>
          </div>
          <div class="mt-6 grid grid-cols-2 gap-6">
            <div>
              <label class="block text-sm text-gray-600 mb-2">Макс. картинок в день</label>
              <input type="number" id="img-\( {username}" value=" \){data[username].maxImages}" class="w-full border-2 border-indigo-200 rounded-2xl px-6 py-4 text-lg">
            </div>
            <div>
              <label class="block text-sm text-gray-600 mb-2">Макс. видео в день</label>
              <input type="number" id="vid-\( {username}" value=" \){data[username].maxVideos}" class="w-full border-2 border-indigo-200 rounded-2xl px-6 py-4 text-lg">
            </div>
          </div>
          <div class="flex gap-4 mt-6">
            <button onclick="saveLimits('${username}')" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-5 rounded-3xl text-lg">Сохранить лимиты</button>
            \( {username !== 'admin' ? `<button onclick="deleteUser(' \){username}')" class="flex-1 bg-red-600 hover:bg-red-700 text-white py-5 rounded-3xl text-lg">Удалить пользователя</button>` : ''}
          </div>
        `;
        container.appendChild(div);
      });
    }

    window.addUser = async function() {
      const username = document.getElementById('new-username').value.trim();
      const password = document.getElementById('new-password').value;
      if (!username || !password) return alert('Заполни оба поля');
      const result = await apiUsers('add', { username, password });
      if (result.success) {
        alert('Пользователь ' + username + ' создан');
        loadUsers();
      } else {
        alert(result.error || 'Ошибка создания');
      }
    };

    window.saveLimits = async function(username) {
      const maxImages = parseInt(document.getElementById('img-' + username).value) || 10;
      const maxVideos = parseInt(document.getElementById('vid-' + username).value) || 5;
      // Здесь можно добавить обновление лимитов через API (пока алерт)
      alert('Лимиты для ' + username + ' обновлены');
      loadUsers();
    };

    window.deleteUser = async function(username) {
      if (confirm('Удалить пользователя ' + username + '?')) {
        const result = await apiUsers('delete', { username });
        if (result.success) {
          alert('Пользователь ' + username + ' удалён');
          loadUsers();
        } else {
          alert(result.error || 'Ошибка удаления');
        }
      }
    };

    loadUsers();
  </script>
</body>
</html>
