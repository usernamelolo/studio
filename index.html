<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Генератор Контента</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f8fafc; font-family: system-ui; }
    .header { background: linear-gradient(90deg, #4f46e5, #7c3aed); }
    .tab-active { background: #4f46e5; color: white; font-weight: 700; }
    .card { background: white; border: 2px solid #e0e7ff; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05); }
    video, img { border-radius: 16px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="text-gray-900 min-h-screen pb-20">

  <!-- HEADER -->
  <div class="header text-white py-8 px-6 flex justify-between items-center">
    <h1 class="text-3xl font-bold tracking-tight">AI Генератор Контента</h1>
    <div class="flex items-center gap-4">
      <span id="current-user" class="bg-white/20 px-6 py-3 rounded-2xl text-lg"></span>
      <button onclick="logout()" class="bg-white/20 hover:bg-white/30 px-8 py-4 rounded-2xl text-lg transition">Выйти</button>
    </div>
  </div>

  <!-- ВЕРТИКАЛЬНЫЕ ВКЛАДКИ -->
  <div class="flex flex-col gap-3 items-center mb-10 px-4">
    <button onclick="switchTab(0)" id="tab0" class="tab-active w-full max-w-xs px-10 py-5 text-2xl rounded-3xl">🎥 Видео из фото</button>
    <button onclick="switchTab(1)" id="tab1" class="w-full max-w-xs px-10 py-5 text-2xl rounded-3xl border-2 border-indigo-200">🖼️ Изображения из фото</button>
    <button onclick="switchTab(2)" id="tab2" class="w-full max-w-xs px-10 py-5 text-2xl rounded-3xl border-2 border-indigo-200">📝 Генерация из текста</button>
    <a href="results.html" class="w-full max-w-xs px-10 py-5 text-2xl rounded-3xl border-2 border-indigo-200 text-center hover:bg-indigo-50">📜 Мои результаты</a>
    <a href="admin.html" id="admin-tab" class="w-full max-w-xs px-10 py-5 text-2xl rounded-3xl border-2 border-indigo-200 text-center hover:bg-indigo-50 hidden">👑 Админ панель</a>
  </div>

  <!-- ВИДЕО ИЗ ФОТО -->
  <div id="section-video" class="card p-6 mx-4 rounded-3xl">
    <h2 class="text-3xl font-semibold mb-6 text-indigo-700">🎥 Видео из загруженного фото</h2>
    <div class="max-w-2xl mx-auto">
      <input type="file" id="video-image-upload" accept="image/*" class="block w-full border-2 border-dashed border-indigo-300 rounded-2xl p-6 text-center cursor-pointer mb-6">
      <textarea id="video-image-prompt" rows="4" class="w-full border-2 border-indigo-200 rounded-2xl p-6 text-lg" placeholder="Опишите желаемую анимацию..."></textarea>
      
      <div id="video-options" class="grid grid-cols-3 gap-4 mt-6"></div>
      
      <div class="mt-6 text-center text-indigo-600 font-medium" id="video-limit-info"></div>
      
      <button onclick="generateVideo()" class="mt-10 w-full bg-indigo-600 hover:bg-indigo-700 text-white text-2xl font-semibold py-7 rounded-3xl transition">Создать видео</button>
    </div>

    <div id="video-result" class="mt-12 hidden">
      <video id="video-player" controls class="w-full max-w-4xl mx-auto rounded-3xl"></video>
      <div class="flex gap-4 mt-6">
        <button onclick="downloadVideo()" class="flex-1 bg-indigo-600 text-white py-5 rounded-3xl">Скачать</button>
        <button onclick="extendVideo()" id="extend-btn" class="flex-1 bg-green-600 text-white py-5 rounded-3xl">Продлить видео (+8 сек)</button>
      </div>
    </div>
    <div id="video-debug" class="mt-8 bg-slate-900 text-emerald-300 p-6 rounded-2xl font-mono text-sm overflow-auto max-h-96"></div>
  </div>

  <!-- ИЗОБРАЖЕНИЯ ИЗ ФОТО -->
  <div id="section-image" class="card p-6 mx-4 rounded-3xl hidden">
    <h2 class="text-3xl font-semibold mb-6 text-indigo-700">🖼️ Изображения из загруженного фото</h2>
    <div class="max-w-2xl mx-auto">
      <input type="file" id="main-edit-upload" accept="image/*" class="block w-full border-2 border-dashed border-indigo-300 rounded-2xl p-6 text-center cursor-pointer mb-6">
      <textarea id="edit-prompt" rows="4" class="w-full border-2 border-indigo-200 rounded-2xl p-6 text-lg" placeholder="Опишите желаемые изменения..."></textarea>
      <button onclick="editImage()" class="mt-8 w-full bg-indigo-600 hover:bg-indigo-700 text-white text-2xl font-semibold py-7 rounded-3xl transition">Сгенерировать 1 изображение</button>
    </div>
    <div id="image-result" class="mt-12 hidden text-center">
      <img id="variant1" class="max-w-2xl mx-auto rounded-3xl">
      <button onclick="downloadImage(1)" class="mt-6 bg-indigo-600 text-white px-12 py-5 rounded-3xl">Скачать изображение</button>
    </div>
  </div>

  <!-- ГЕНЕРАЦИЯ ИЗ ТЕКСТА -->
  <div id="section-text" class="card p-6 mx-4 rounded-3xl hidden">
    <h2 class="text-3xl font-semibold mb-6 text-indigo-700">📝 Генерация картинок из текста</h2>
    <div class="max-w-2xl mx-auto">
      <textarea id="text-prompt" rows="6" class="w-full border-2 border-indigo-200 rounded-2xl p-6 text-lg" placeholder="Опишите картинку..."></textarea>
      <button onclick="generateTextImages()" class="mt-8 w-full bg-indigo-600 hover:bg-indigo-700 text-white text-2xl font-semibold py-7 rounded-3xl transition">Сгенерировать 2 изображения</button>
    </div>
    <div id="text-result" class="mt-12 hidden">
      <div id="text-gallery" class="grid grid-cols-2 gap-6"></div>
    </div>
  </div>

  <script>
    const API_BASE = "/api/proxy";
    let currentUser = null;
    let currentRole = null;
    let lastVideoBase64 = '';
    let lastVideoPrompt = '';
    let videoInterval = null;

    function checkAuth() {
      currentUser = localStorage.getItem('currentUser');
      if (!currentUser) {
        window.location.href = 'login.html';
        return false;
      }
      document.getElementById('current-user').textContent = `👤 ${currentUser}`;
      if (currentUser === 'nysp') document.getElementById('admin-tab').classList.remove('hidden');
      return true;
    }

    function logout() {
      localStorage.removeItem('currentUser');
      window.location.href = 'login.html';
    }

    function switchTab(n) {
      document.querySelectorAll('[id^="section-"]').forEach(s => s.classList.add('hidden'));
      const sections = ['video','image','text'];
      document.getElementById('section-' + sections[n]).classList.remove('hidden');
      document.querySelectorAll('[id^="tab"]').forEach(t => t.classList.remove('tab-active'));
      document.getElementById('tab' + n).classList.add('tab-active');
    }

    async function apiGenerations(action, data = {}) {
      const res = await fetch('/api/generations', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ user: currentUser, action, data })
      });
      return res.json();
    }

    async function saveGeneration(type, url, prompt) {
      try {
        await apiGenerations('save', { type, url, prompt });
      } catch(e) {}
    }

    // ==================== ВИДЕО ====================
    async function generateVideo() {

      // после успешной генерации добавь:

    }

    async function extendVideo() {
      // полная функция продления видео (из предыдущей версии)
    }

    // ==================== ИЗОБРАЖЕНИЯ ИЗ ФОТО ====================
    async function editImage() {
      // ... генерация 1 картинки
      if (data.data && data.data[0]) {
        const src = `data:image/jpeg;base64,${data.data[0].b64_json}`;
        document.getElementById('variant1').src = src;
        document.getElementById('image-result').classList.remove('hidden');
        await saveGeneration('image', src, document.getElementById('edit-prompt').value);
      }
    }

    // ==================== ГЕНЕРАЦИЯ ИЗ ТЕКСТА ====================
    async function generateTextImages() {
      // ... генерация 2 картинок
      if (data.data && data.data.length) {
        const gallery = document.getElementById('text-gallery');
        gallery.innerHTML = '';
        data.data.forEach(img => {
          const src = `data:image/jpeg;base64,${img.b64_json}`;
          const div = document.createElement('div');
          div.innerHTML = `<img src="${src}" class="w-full rounded-3xl">`;
          gallery.appendChild(div);
          saveGeneration('image', src, document.getElementById('text-prompt').value);
        });
        document.getElementById('text-result').classList.remove('hidden');
      }
    }

    // ИНИЦИАЛИЗАЦИЯ
    if (checkAuth()) {
      switchTab(0);
    }
  </script>
</body>
</html>
