<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мои результаты</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-6 bg-gray-50">
  <h1 class="text-4xl font-bold mb-8">📜 Мои результаты и статистика</h1>
  <div id="results-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

  <script>
    const user = localStorage.getItem('currentUser');
    fetch('/api/generations?action=get&user=' + user)
      .then(r => r.json())
      .then(data => {
        const grid = document.getElementById('results-grid');
        grid.innerHTML = '';
        data.forEach(item => {
          const div = document.createElement('div');
          div.className = 'bg-white border border-indigo-100 rounded-3xl p-4';
          if (item.type === 'image') {
            div.innerHTML = `<img src="${item.url}" class="w-full rounded-2xl"><a href="${item.url}" download class="block mt-4 text-center bg-indigo-600 text-white py-3 rounded-2xl">Скачать картинку</a>`;
          } else {
            div.innerHTML = `<video src="${item.url}" controls class="w-full rounded-2xl"></video><a href="${item.url}" download class="block mt-4 text-center bg-indigo-600 text-white py-3 rounded-2xl">Скачать видео</a>`;
          }
          grid.appendChild(div);
        });
      });
  </script>
</body>
</html>
